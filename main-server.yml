---
- hosts: server-new
  become: yes

  pre_tasks:
    - name: install various packages
      apt:
        name: "{{ packages }}"
        state: present
        update_cache: yes
      vars:
        packages:
          - vim
          - net-tools
          - mc
          - nmap
          - iotop
          - iftop
          - stress-ng
          - lm-sensors
          - bind9-dnsutils
          - bind9-host
          - dos2unix
          - apt-transport-https
          - gnupg

    - name: configure various packages
      template: src=templates/{{ item }} dest=/{{ item }} owner=root group=root mode=0644
      with_items:
        - etc/htoprc

  roles:
  - role: chrony
    vars:
      chrony_mode: 'ntp_client'
    tags: chrony

  - role: dovecot
    tags: dovecot
  
  - role: postfix
    tags: postfix

  - role: docker
    tags: docker

  - role: samba
    vars:
      samba_mode: 'server'
    tags: samba

  - role: apache
    vars:
      apache_system: 'server'
      apache_templates:
        - /etc/apache2/ports.conf
        - /etc/apache2/sites-enabled/000-default-custom.conf
      apache_files:
        - /var/www/html/favicon.ico
      apache_remove:
        - /etc/apache2/sites-enabled/000-default.conf
    tags: apache

  - role: nginx
    vars:
      nginx_system: 'server'
      nginx_templates:
        - /etc/nginx/conf.d/0-log-format.conf
        - /etc/nginx/conf.d/default.conf
      nginx_remove:
        - /etc/nginx/sites-enabled/default
    tags: nginx

  - role: cgit
    vars:
      cgit_system: 'server'
    tags: cgit
